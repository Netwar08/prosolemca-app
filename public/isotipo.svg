<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="gLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#071826"/>
      <stop offset="100%" stop-color="#103352"/>
    </linearGradient>
    <linearGradient id="gRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7B1D22"/>
    </linearGradient>
  </defs>

  <!-- TOP FACE (dark gray) -->
  <polygon points="50,5 90,25 50,45 10,25" fill="url(#gTop)"/>

  <!-- LEFT FACE (navy) -->
  <polygon points="10,25 50,45 50,90 10,70" fill="url(#gLeft)"/>

  <!-- RIGHT/FRONT FACE (red) -->
  <polygon points="50,45 90,25 90,70 50,90" fill="url(#gRight)"/>

  <!-- P-SHAPED TUNNEL OPENING — dark interior visible from front -->
  <!-- Outer P polygon (stem + bowl + counter area = all dark) -->
  <polygon
    points="57,82 57,53 82,36 82,58 65,66 65,77 57,82"
    fill="#1a0508"
  />

  <!-- Counter — red material punched back inside the P bowl -->
  <!-- Makes it look like letter P rather than solid D shape -->
  <polygon
    points="65,51 79,44 79,57 65,64"
    fill="#A0232A"
  />
  <!-- Slight shadow on counter to suggest depth -->
  <polygon
    points="65,51 79,44 79,57 65,64"
    fill="#000000" opacity="0.15"
  />

  <!-- Tunnel rim highlights (top edge catches light) -->
  <line x1="57" y1="53" x2="82" y2="36"
    stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="65" y1="51" x2="79" y2="44"
    stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>

  <!-- CUBE EDGES -->
  <polygon points="50,5 90,25 50,45 10,25"
    fill="none" stroke="white" stroke-width="0.7" opacity="0.28"/>
  <line x1="10" y1="25" x2="10"  y2="70"  stroke="white" stroke-width="0.7" opacity="0.22"/>
  <line x1="50" y1="45" x2="50"  y2="90"  stroke="white" stroke-width="0.7" opacity="0.22"/>
  <line x1="90" y1="25" x2="90"  y2="70"  stroke="white" stroke-width="0.7" opacity="0.22"/>
  <line x1="10" y1="70" x2="50"  y2="90"  stroke="white" stroke-width="0.7" opacity="0.22"/>
  <line x1="90" y1="70" x2="50"  y2="90"  stroke="white" stroke-width="0.7" opacity="0.22"/>
</svg>
